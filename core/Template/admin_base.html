
<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

  <style>
    /* Targeting the active link directly */
    .nav-pills .nav-link.active {
        font-weight: bold;
        background-color: #f8f9fa; /* Light grey background for active */
        color: #0d6efd; /* Bootstrap primary blue */
    }

    .nav-link:hover {
        background-color: #f8f9fa;
    }

    /* Ensure the sidebar doesn't shrink on smaller screens */
    .sidebar {
        min-width: 280px;
        max-width: 280px;
        height: 100vh;
        position: sticky;
        top: 0;
    }
  </style>
</head>
<body class="bg-light">
<div class="d-flex">
  <!-- Sidebar -->
  <div class="d-flex flex-column flex-shrink-0 p-3 bg-white border-end sidebar">
    <div class="d-flex align-items-center pb-3 mb-3 border-bottom">
      <div class="bg-dark text-white d-flex align-items-center justify-content-center rounded-3 fw-bold" style="width: 40px; height: 40px;">
        SE
      </div>
      <div class="ms-3 text-dark">
        <h6 class="mb-0 fw-bold">UM Engage</h6>
        <small class="text-secondary text-uppercase fw-semibold" style="font-size: 10px; letter-spacing: 1px;">Admin Portal</small>
      </div>
    </div>

    <div class="text-secondary fw-bold mb-2 ps-2" style="font-size: 11px; letter-spacing: 2px;">
      NAVIGATION
    </div>

    <ul class="nav nav-pills flex-column mb-3">
      <li class="nav-item">
        <a href="{% url 'admin_dashboard' %}" class="nav-link d-flex align-items-center gap-2 mb-1
           {% if request.resolver_match.url_name == 'admin_dashboard' %}active{% else %}link-dark{% endif %}">
          <i class="bi bi-grid fs-5"></i>
          Dashboard
        </a>
      </li>
      <li class="nav-item">
        <a href="{% url 'admin_applications' %}" class="nav-link d-flex align-items-center gap-2 mb-1
           {% if request.resolver_match.url_name == 'admin_applications' %}active{% else %}link-dark{% endif %}">
          <i class="bi bi-file-earmark-text fs-5"></i>
          Applications
        </a>
      </li>
      <li class="nav-item">
        <a href="{% url 'admin_events' %}" class="nav-link d-flex align-items-center gap-2 mb-1
           {% if request.resolver_match.url_name == 'admin_events' %}active{% else %}link-dark{% endif %}">
          <i class="bi bi-calendar-event fs-5"></i>
          Events
        </a>
      </li>
    </ul>

    <div class="mt-auto pt-3 border-top">
      <a href="/logout" class="nav-link link-danger d-flex align-items-center gap-2 p-2 rounded">
        <i class="bi bi-box-arrow-right fs-5"></i>
        <span>Logout</span>
      </a>
    </div>
  </div>

  <!-- Main Content Area -->
  <div class="flex-grow-1 d-flex flex-column" style="min-height: 100vh;">
    <main class="p-4 flex-grow-1">
        {% block content %}
        <!-- Content goes here -->
        {% endblock %}
    </main>

    <footer class="py-3 text-center text-muted border-top bg-white">
        &copy; 2026 UM Engage System
    </footer>
  </div>
</div>

<script src="{% static 'core/js/bootstrap.bundle.min.js' %}"></script>

</body>
</html>
